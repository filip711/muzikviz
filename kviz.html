<!DOCTYPE html>
<html lang="mkd">
<head>
<meta charset="UTF-8">
<title>Quiz with Sound</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  height: 100vh;
  width: 100vw;

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;
  color: white;

  background: radial-gradient(circle at top, #0b1220, #05070f);
}

/* glowing background */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  filter: blur(90px);
  z-index: 0;
}

body::before {
  background: rgba(34,197,94,0.25);
  top: -200px;
  left: -200px;
  animation: float 6s ease-in-out infinite alternate;
}

body::after {
  background: rgba(59,130,246,0.25);
  bottom: -200px;
  right: -200px;
  animation: float 7s ease-in-out infinite alternate;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(30px); }
}

/* MAIN CARD */
.container {
  position: relative;
  z-index: 2;

  width: 90%;
  max-width: 600px;
  height: 80vh; /* 👈 важно */
  padding: 40px;

  display: flex;
  flex-direction: column;
  justify-content: center; /* center content */
  align-items: center;

  text-align: center;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 25px;

  backdrop-filter: blur(25px);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* TITLE */
h1 {
  font-size: 38px;
  margin-bottom: 15px;
  text-shadow: 0 0 20px rgba(34,197,94,0.4);
}

/* QUESTION */
.question {
  font-size: 24px;
  margin: 20px 0;
  font-weight: 500;
}

/* ANSWERS */
.answers {
  width: 100%;
}

.answers button {
  width: 100%;
  padding: 16px;
  margin: 10px 0;

  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;

  font-size: 17px;
  color: white;

  background: linear-gradient(135deg, #0f172a, #1e293b);

  cursor: pointer;
  transition: all 0.25s ease;

  position: relative;
  overflow: hidden;
}

/* hover */
.answers button:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 0 20px rgba(34,197,94,0.4);
  border-color: rgba(34,197,94,0.4);
}

/* click ripple */
.answers button:active {
  transform: scale(0.97);
}

/* correct */
.correct {
  background: linear-gradient(135deg, #16a34a, #22c55e) !important;
  box-shadow: 0 0 25px rgba(34,197,94,0.6);
}

/* wrong */
.wrong {
  background: linear-gradient(135deg, #dc2626, #ef4444) !important;
  box-shadow: 0 0 25px rgba(239,68,68,0.6);
}

/* progress */
.progress {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #3b82f6);
  transition: 0.4s ease;
  box-shadow: 0 0 10px #22c55e;
}

/* timer */
.timer {
  margin: 10px;
  font-size: 15px;
  opacity: 0.8;
}

/* result */
#result {
  font-size: 26px;
  margin-top: 15px;
  color: #22c55e;
  text-shadow: 0 0 15px rgba(34,197,94,0.5);
}

/* PLAY AGAIN BUTTON */
#playBtn {
  display: none;

  margin-top: 20px; /* 👈 ова го турка долу */
  padding: 14px 28px;

  border: none;
  border-radius: 14px;

  font-size: 18px;
  font-weight: 600;

  color: white;
  background: linear-gradient(135deg, #22c55e, #3b82f6);

  cursor: pointer;

  box-shadow: 0 0 25px rgba(34,197,94,0.4);

  transition: all 0.3s ease;
}

/* hover glow */
#playBtn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 35px rgba(34,197,94,0.7);
}

/* click */
#playBtn:active {
  transform: scale(0.95);
}

/* shine effect */
#playBtn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transform: skewX(-20deg);
  transition: 0.5s;
}

#playBtn:hover::before {
  left: 120%;
}
</style>
</head>

<body>

<div class="container">
  <h1>Квиз по Граѓанство</h1>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="timer">Time: <span id="time">10</span>s</div>

  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>

  <h2 id="result"></h2>

  <button id="playBtn" onclick="resetQuiz()">
    Play Again 🔁
  </button>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
const questions = [
  {
    q: "Што се религиски принципи?",
    options: [
      "Основни верувања и правила според кои верниците ја следат својата религија.",
      "Законски правила што ги носи државата за казни и судови",
      "Географски локации на манастири и храмови"
    ],
    correct: "Основни верувања и правила според кои верниците ја следат својата религија."
  },
  {
    q: "Кое е златното правило на етичките принципи?",
    options: [
      "Прави им на другите она што сакаш тие да ти прават тебе.",
      "Моли се само кога ти треба нешто од Бог.",
      "Следи ги правилата само кога другите те гледаат."
    ],
    correct: "Прави им на другите она што сакаш тие да ти прават тебе."
  },
  {
    q: "Што е праведност меѓу религиите?",
    options: [
      "Само една религија е важна, другите не се.",
      "Праведност кон религиите значи почитување на сите религии без дискриминација.",
      "Исмејување на други религии е дозволено."
    ],
    correct: "Праведност кон религиите значи почитување на сите религии без дискриминација."
  },
  {
    q: "Што е милосрдие?",
    options: [
      "Казнување на луѓе што грешат.",
      "Добрина и помагање на луѓе во неволја без да очекуваш ништо тза возвра.",
      "Правило за одење во училиште."
    ],
    correct: "Добрина и помагање на луѓе во неволја без да очекуваш ништо за возврат."
  },
  {
    q: "Што е сочуство?",
    options: [
      "Правење правила за спорт",
      "Игнорирање на туѓи проблеми.",
      "Разбирање и чувствување на туѓа болка и желба да се помогне."
    ],
    correct: "Разбирање и чувствување на туѓа болка и желба да се помогне."
  },
  {
    q: "Што е искреност?",
    options: [
      "Кажување на вистината и чесно постапување без лажење.",
      "Измислување приказни за да бидеш интересен.",
      "Криење на вистината од сите."
    ],
    correct: "Кажување на вистината и чесно постапување без лажење."
  },
  {
    q: "Што е дарежливост?",
    options: [
      "Игнорирање на луѓе што имаат потреба.",
      "Чување на сè само за себе.",
      "Спремност да се дели и помага на други без да се очекува нешто назад."
    ],
    correct: "Спремност да се дели и помага на други без да се очекува нешто назад."
  },
  {
    q: "Што е проштевање?",
    options: [
      "Одмазда кон луѓе што згрешиле.",
      "Пуштање и простување на туѓи грешки без одмазда.",
      "Игнорирање на сите луѓе."
    ],
    correct: "Пуштање и простување на туѓи грешки без одмазда."
  },
  {
    q: "Што е ненасилство?",
    options: [
      "Одбивање на насилство и решавање конфликти со мир.",
      "Користење сила за решавање проблеми.",
      "Секогаш кавга со други."
    ],
    correct: "Одбивање на насилство и решавање конфликти со мир."
  },
  {
    q: "Што е поддршка на заедницата и солидарност?",
    options: [
      "Работа само за себе без други луѓе.",
      "Игнорирање на заедницата.",
      "Помагање и поддршка на луѓето во заедницата."
    ],
    correct: "Помагање и поддршка на луѓето во заедницата."
  }
];




let current = 0;
let score = 0;
let time = 10;
let timer;

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function resetQuiz() {
  clearInterval(timer);

  current = 0;
  score = 0;
  time = 10;

  document.getElementById("playBtn").style.display = "none";
  document.getElementById("result").innerText = "";

  loadQuestion();
}
function endGame() {
  clearInterval(timer);

  document.getElementById("question").innerText = "💀 Game Over";
  document.getElementById("answers").innerHTML = "";

  document.getElementById("result").innerText =
    `Освоивте ${score} од ${questions.length} поени`;

  document.getElementById("playBtn").style.display = "inline-block";
}

function loadQuestion() {
  clearInterval(timer);

  time = 20;
  document.getElementById("time").innerText = time;

timer = setInterval(() => {
  time--;
  document.getElementById("time").innerText = time;

  if (time === 0) {
    endGame(); // 👈 наместо reset
  }
}, 1000);

  const q = questions[current];
  document.getElementById("question").innerText = q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  const shuffled = shuffle([...q.options]);

  shuffled.forEach(option => {
    const btn = document.createElement("button");
    btn.innerText = option;

btn.onclick = () => {
  if (option === q.correct) {
    btn.classList.add("correct");
    correctSound.play();
    score++;
  } else {
    btn.classList.add("wrong");
    wrongSound.play();
  }

  setTimeout(() => {
    if (current + 1 >= questions.length) {
      endGame();
    } else {
      nextQuestion();
    }
  }, 800);
};

    answersDiv.appendChild(btn);
  });

  updateProgress();
}

function nextQuestion() {
  current++;

  if (current >= questions.length) {
    resetQuiz();
  } else {
    loadQuestion();
  }
}

function updateProgress() {
  const percent = (current / questions.length) * 100;
  document.getElementById("progress").style.width = percent + "%";
}

loadQuestion();
</script>

</body>
</html>
